<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="counter-card">
            <h1>Interactive Counter</h1>
            <div class="counter-value" id="counterValue">0</div>
            <div class="button-group">
                <button class="btn btn-decrement" id="decrementBtn">-</button>
                <button class="btn btn-reset" id="resetBtn">Reset</button>
                <button class="btn btn-increment" id="incrementBtn">+</button>
            </div>
            <p class="info">Click the buttons to change the value</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
